name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint (ruff) — production code
        run: uv run ruff check src/ tests/

      - name: Lint (ruff) — research scripts (non-blocking)
        run: uv run ruff check scripts/
        continue-on-error: true

      - name: Format check (ruff) — production code
        run: uv run ruff format --check src/ tests/
        continue-on-error: true  # format drift in src/tests is warning-only

      - name: Type check (mypy)
        run: uv run mypy src/
        continue-on-error: true  # mypy warnings are non-blocking for now

      - name: Run tests
        run: uv run pytest -x --tb=short
        env:
          PALIMPSEST_NEO4J_URI: bolt://localhost:7687
          PALIMPSEST_NEO4J_USER: neo4j
          PALIMPSEST_NEO4J_PASSWORD: dummy  # tests mock Neo4j

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7
