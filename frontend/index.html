<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Palimpsest — Science of Science Research Platform</title>

    <!-- SEO Meta -->
    <meta name="description" content="Interactive bibliographic graph explorer for science of science research. Visualize citation networks, co-authorship graphs, retraction cascades, and AI diffusion across 479M+ scholarly works." />
    <meta name="keywords" content="science of science, bibliometrics, citation network, co-authorship, retraction, AI diffusion, OpenAlex, SuanAI" />
    <meta name="author" content="Suan Lab" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0f0f23" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Palimpsest" />
    <meta property="og:description" content="Interactive bibliographic graph explorer for science of science research. Visualize citation networks, co-authorship graphs, and AI diffusion across 479M+ scholarly works." />
    <meta property="og:site_name" content="Palimpsest" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Palimpsest" />
    <meta name="twitter:description" content="Interactive bibliographic graph explorer for science of science research. 479M+ works, citation networks, AI diffusion analysis." />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Palimpsest",
      "description": "Interactive bibliographic graph explorer for science of science research",
      "applicationCategory": "ResearchApplication",
      "operatingSystem": "Web",
      "creator": {
        "@type": "Organization",
        "name": "Suan Lab"
      }
    }
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-[#0f0f23] text-gray-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
